{% extends "base.html" %}
{% block content %}

<body style="background: linear-gradient(135deg, #6dd5ed, #2193b0); min-height: 100vh; padding: 40px 0;">
    <div class="container">

        <!-- Summary Display & Edit Section -->
        <div class="card mb-5 p-4" style="border: none; border-radius: 15px; box-shadow: 0 6px 18px rgba(0,0,0,0.2); background-color: #ffffffee;">
            <h1 class="text-center mb-3" style="font-family: 'Segoe UI', sans-serif; color: #222;">Here's your summary!</h1>
            <hr />

            <form method="POST" action="/save_summary">
                <div class="form-group">
                    <label for="edited_summary" class="mb-2"><h5>Edit your summary:</h5></label>
                    <textarea class="form-control" id="edited_summary" name="edited_summary" rows="5" style="border-radius: 10px;">{{ text }}</textarea>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-5 py-2">💾 Save Summary</button>
                </div>
            </form>
        </div>

        <!-- Original Text Section with Opacity Indicators -->
        <div class="card p-4" style="border: none; border-radius: 15px; box-shadow: 0 6px 18px rgba(0,0,0,0.2); background-color: #ffffffee;">
            <h2 class="text-center mb-3" style="font-family: 'Segoe UI', sans-serif;">Here's your original text!</h2>
            <p class="text-muted text-center mb-4">The higher the opacity, the more important a sentence is. The lower the opacity, the less important the sentence is.</p>

            <div style="line-height: 1.8; text-align: left;">
                {% for sent, weight in sents %}
                    <span style="opacity: {{ weight }}; display: block; transition: all 0.3s ease;">{{ sent }}</span>
                {% endfor %}
            </div>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-4">
            <a href="/index" class="btn btn-outline-light mt-3">⬅ Go Back</a>
        </div>

    </div>
</body>

{% endblock %}
