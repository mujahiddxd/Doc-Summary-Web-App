{% extends "base.html" %}
{% block content %}

<body style="background: linear-gradient(to right, #6a11cb, #2575fc); padding: 40px 0; min-height: 100vh;">
    <div class="container text-white position-relative">

        <!-- Back Button -->
        <div class="position-absolute top-0 start-0 m-4">
            <a href="{{ url_for('index') }}" class="btn btn-light">← Back</a>
        </div>

        <div class="pt-5 mt-5">

            <!-- Title -->
            <h1 class="display-5 fw-bold text-center mb-4">💬 Chat with Your Summary Assistant</h1>

            <!-- Summary Dropdown Card -->
            <div class="card p-4 mb-4 mx-auto" style="border-radius: 15px; background-color: #ffffff; color: #333; max-width: 800px;">
                <h5><strong>Select a Summary:</strong></h5>
                <select id="summary-select" class="form-select mb-3" onchange="updateSummary()">
                    {% for summary in summaries %}
                    <option value="{{ summary.id }}" title="{{ summary.summary_content }}">{{ summary.summary_content|truncate(100) }}</option>
                    {% endfor %}
                </select>

                <!-- Summary Text -->
                <div class="p-3 border rounded bg-light text-dark" id="summary-display" style="max-height: 150px; overflow-y: auto;">
                    <strong>Selected Summary:</strong>
                    <p id="selected-summary-text" class="mb-0"></p>
                </div>
            </div>

            <!-- Chat Interface -->
            <div class="card p-4 mx-auto" style="border-radius: 15px; background-color: #ffffff; color: #333; max-width: 800px;">
                <!-- Chat messages -->
                <div id="messages" class="mb-3 p-3 border rounded" style="height: 300px; overflow-y: auto; background-color: #f8f9fa;">
                    <!-- Messages will be appended here -->
                </div>

                <!-- Input field -->
                <div class="input-group">
                    <input type="text" id="user-input" class="form-control" placeholder="Type your question here..." autocomplete="off">
                    <button onclick="sendMessage()" class="btn btn-primary">Ask</button>
                </div>
            </div>

        </div>
    </div>

    <style>
        /* Chat bubble styles */
        .chat-message {
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #d1e7ff;
            text-align: right;
            align-self: flex-end;
            margin-left: auto;
        }

        .bot-message {
            background-color: #e2e3e5;
            text-align: left;
            align-self: flex-start;
            margin-right: auto;
        }

        #messages {
            display: flex;
            flex-direction: column;
        }
    </style>

    <script>
        function updateSummary() {
            const selectedOption = document.getElementById("summary-select").selectedOptions[0];
            const fullText = selectedOption.getAttribute("title");
            document.getElementById("selected-summary-text").textContent = fullText;
        }

        function sendMessage() {
            const userInput = document.getElementById('user-input').value;
            const selectedSummaryId = document.getElementById('summary-select').value;

            if (userInput.trim() === '' || !selectedSummaryId) {
                alert("Please enter a question and select a summary.");
                return;
            }

            // Append user message
            const userMessageDiv = `<div class="chat-message user-message">${userInput}</div>`;
            document.getElementById('messages').innerHTML += userMessageDiv;
            document.getElementById('user-input').value = '';

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_input: userInput,
                    summary_id: selectedSummaryId
                }),
            })
            .then(response => response.json())
            .then(data => {
                const botMessage = `<div class="chat-message bot-message">${data.response}</div>`;
                document.getElementById('messages').innerHTML += botMessage;
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            })
            .catch(error => console.error('Error:', error));
        }

        // Set default summary on page load
        window.onload = function () {
            updateSummary();
        };
    </script>
</body>

{% endblock %}
